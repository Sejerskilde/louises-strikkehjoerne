<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Louises Strikkehjørne</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f7f3eb;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  color:#6b4f3a;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#d9c7b3;
  font-size:18px;
  margin-top:10px;
  cursor:pointer;
}

.card{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,
select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:8px;
  box-sizing:border-box;
  border:1px solid #ddd;
  border-radius:8px;
}

#formular{
  display:none;
}

.sletKnap{
  background:#f2c7c7;
}

.status{
  display:inline-block;
  padding:6px 10px;
  border-radius:20px;
  margin-top:5px;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>🧶 Louises Strikkehjørne</h1>

<button onclick="visFormular()">
➕ Nyt Projekt
</button>

<div id="formular" class="card">

<input id="projektNavn" placeholder="Projektnavn">

<input id="garnNavn" placeholder="Garn">

<input id="pind" placeholder="Pindestørrelse">

<select id="status">
  <option value="🟡 Ikke startet">🟡 Ikke startet</option>
  <option value="🟠 I gang">🟠 I gang</option>
  <option value="🟢 Færdig">🟢 Færdig</option>
</select>

<button onclick="gemProjekt()">
💾 Gem Projekt
</button>

</div>

<h2>Mine Projekter</h2>

<div id="liste"></div>

<script>

function visFormular(){
  document.getElementById("formular").style.display="block";
}

function gemProjekt(){

  let navn =
  document.getElementById("projektNavn").value;

  let garn =
  document.getElementById("garnNavn").value;

  let pind =
  document.getElementById("pind").value;

  let status =
  document.getElementById("status").value;

  if(navn===""){
    alert("Skriv et projektnavn");
    return;
  }

  let projekter =
  JSON.parse(localStorage.getItem("projekter")) || [];

  projekter.push({
    navn: navn,
    garn: garn,
    pind: pind,
    status: status
  });

  localStorage.setItem(
    "projekter",
    JSON.stringify(projekter)
  );

  document.getElementById("projektNavn").value="";
  document.getElementById("garnNavn").value="";
  document.getElementById("pind").value="";

  visProjekter();
}

function sletProjekt(index){

  let projekter =
  JSON.parse(localStorage.getItem("projekter")) || [];

  projekter.splice(index,1);

  localStorage.setItem(
    "projekter",
    JSON.stringify(projekter)
  );

  visProjekter();
}

function visProjekter(){

  let projekter =
  JSON.parse(localStorage.getItem("projekter")) || [];

  let html="";

  projekter.forEach(function(projekt,index){

    html += `
      <div class="card">

        <h3>${projekt.navn}</h3>

        <p><strong>Garn:</strong> ${projekt.garn}</p>

        <p><strong>Pind:</strong> ${projekt.pind}</p>

        <p><strong>Status:</strong> ${projekt.status || "🟡 Ikke startet"}</p>

        <button class="sletKnap"
        onclick="sletProjekt(${index})">
        🗑️ Slet Projekt
        </button>

      </div>
    `;
  });

  document.getElementById("liste").innerHTML = html;
}

visProjekter();

</script>

</body>
</html>
