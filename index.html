<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louises Strikkehjørne 🧶</title>
<style>
  :root {
    --bg:             #fdf0f5;
    --accent:         #d96fa0;
    --accent-light:   #fce4ef;
    --card-bg:        #fff7fb;
    --border:         #f2c4d8;
    --text:           #5a2d4a;
    --muted:          #b07090;
    --soft-tan:       #f5d6e8;
    --green:          #7ec8a0;
    --green-light:    #d8f5e8;
    --yellow-light:   #fdf5d4;
    --red-light:      #fde0ec;
    --stat-bg:        rgba(255,255,255,0.28);
    --shadow:         0 2px 14px rgba(210,100,160,0.10);
    --lavender:       #c8b4e8;
    --lavender-light: #ede4fa;
    --peach-light:    #fdeee4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }
  header { background: linear-gradient(135deg, #e8a0bf 0%, #c8b4e8 100%); color: #fff; text-align: center; padding: 30px 20px 22px; border-bottom: 4px solid #d48cb8; }
  header h1 { font-size: 2rem; letter-spacing: 1px; }
  header p  { font-size: 0.95rem; margin-top: 5px; color: #fce4ef; font-style: italic; }
  .stats { display: flex; gap: 12px; padding: 16px 20px; justify-content: center; flex-wrap: wrap; background: linear-gradient(135deg, #e8a0bf 0%, #c8b4e8 100%); border-bottom: 1px solid var(--border); }
  .stat-box { background: var(--stat-bg); border-radius: 14px; padding: 10px 22px; text-align: center; min-width: 90px; color: #fff; border: 1px solid rgba(255,255,255,0.35); }
  .stat-box .num { font-size: 1.8rem; font-weight: bold; }
  .stat-box .lbl { font-size: 0.70rem; text-transform: uppercase; letter-spacing: 1px; color: #fce4ef; }
  .bolge { width: 100%; height: 18px; background: linear-gradient(135deg, #e8a0bf 0%, #c8b4e8 100%); clip-path: ellipse(55% 100% at 50% 0%); margin-bottom: -2px; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
  .ny-knap { width: 100%; padding: 14px; border: none; border-radius: 16px; background: linear-gradient(135deg, #e8a0bf, #c8b4e8); color: #fff; font-size: 1.1rem; font-family: Georgia, serif; cursor: pointer; box-shadow: 0 3px 14px rgba(210,100,160,0.25); transition: opacity 0.2s; margin-bottom: 20px; }
  .ny-knap:hover { opacity: 0.88; }
  .formular { background: var(--card-bg); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 24px; border: 1px solid var(--border); display: none; }
  .formular h3 { margin-bottom: 14px; color: var(--accent); font-size: 1.1rem; }
  .formular label { display: block; font-size: 0.83rem; color: var(--muted); margin-bottom: 3px; margin-top: 10px; }
  .formular input, .formular select, .formular textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; font-family: Georgia, serif; background: #fff; color: var(--text); }
  .formular input:focus, .formular select:focus, .formular textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .formular textarea { resize: vertical; min-height: 70px; }
  .upload-sektion { margin-top: 12px; }
  .upload-sektion > label { display: block; font-size: 0.83rem; color: var(--muted); margin-bottom: 6px; }
  .upload-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .upload-boks { flex: 1; min-width: 140px; border: 2px dashed var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; cursor: pointer; background: #fff; transition: border-color 0.2s; display: block; }
  .upload-boks:hover { border-color: var(--accent); }
  .upload-boks input[type=file] { display: none; }
  .upload-boks .upload-ikon { font-size: 1.8rem; display: block; }
  .upload-boks .upload-tekst { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
  .upload-preview { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .preview-item { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--accent-light); }
  .preview-item img { width: 80px; height: 80px; object-fit: cover; display: block; }
  .preview-pdf { width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--accent); padding: 6px; text-align: center; }
  .preview-pdf span { font-size: 1.6rem; }
  .preview-slet { position: absolute; top: 2px; right: 2px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; color: #c04070; display: flex; align-items: center; justify-content: center; }
  .form-knapper { display: flex; gap: 10px; margin-top: 16px; }
  .gem-knap { flex: 1; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, #7ec8a0, #a8dfc8); color: #fff; font-size: 1rem; font-family: Georgia, serif; cursor: pointer; }
  .gem-knap:hover { opacity: 0.88; }
  .annuller-knap { padding: 12px 18px; border: none; border-radius: 12px; background: var(--soft-tan); color: var(--text); font-size: 1rem; font-family: Georgia, serif; cursor: pointer; }
  .projekt-kort { background: var(--card-bg); border-radius: 18px; padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .kort-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .kort-titel { font-size: 1.2rem; color: var(--accent); font-weight: bold; }
  .status-badge { font-size: 0.80rem; padding: 4px 13px; border-radius: 20px; font-weight: bold; white-space: nowrap; }
  .status-ikke  { background: var(--yellow-light); color: #7a6200; }
  .status-gang  { background: var(--peach-light);  color: #a05020; }
  .status-faerd { background: var(--green-light);  color: #2a6040; }
  .kort-info { margin-top: 8px; font-size: 0.90rem; color: var(--muted); line-height: 1.7; }
  .noter-boks { margin-top: 10px; background: var(--lavender-light); border-radius: 10px; padding: 10px 14px; font-size: 0.88rem; color: #6040a0; white-space: pre-wrap; border: 1px solid var(--lavender); }
  .medie-galleri { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .medie-item { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; }
  .medie-item:hover { transform: scale(1.03); }
  .medie-item img { width: 90px; height: 90px; object-fit: cover; display: block; }
  .medie-pdf-thumb { width: 90px; height: 90px; background: var(--accent-light); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.72rem; color: var(--accent); padding: 8px; text-align: center; }
  .medie-pdf-thumb span { font-size: 2rem; display: block; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(80,20,60,0.85); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
  .lightbox.aktiv { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 80vh; border-radius: 12px; }
  .lightbox-luk { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }
  .raekke-sektion { margin-top: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .raekke-label { font-size: 0.83rem; color: var(--muted); }
  .raekke-antal { font-size: 1.5rem; font-weight: bold; color: var(--accent); min-width: 36px; text-align: center; }
  .raekke-knap { width: 36px; height: 36px; border: none; border-radius: 50%; font-size: 1.3rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
  .raekke-knap:hover { opacity: 0.8; }
  .raekke-plus  { background: var(--green); color: #fff; }
  .raekke-minus { background: var(--red-light); color: var(--accent); border: 1px solid var(--border); }
  .raekke-nul   { background: var(--soft-tan); color: var(--text); font-size: 0.75rem; padding: 0 12px; width: auto; border-radius: 12px; }
  .kort-handlinger { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .rediger-knap { flex: 1; padding: 9px; border: none; border-radius: 10px; background: var(--lavender-light); border: 1px solid var(--lavender); color: #6040a0; font-size: 0.9rem; font-family: Georgia, serif; cursor: pointer; }
  .rediger-knap:hover { background: var(--lavender); color: #fff; }
  .slet-knap { padding: 9px 14px; border: none; border-radius: 10px; background: var(--red-light); border: 1px solid var(--border); color: #c04070; font-size: 0.9rem; font-family: Georgia, serif; cursor: pointer; }
  .slet-knap:hover { background: #f9b8d0; }
  .tom-besked { text-align: center; color: var(--muted); padding: 50px 20px; font-style: italic; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(180,80,140,0.25); backdrop-filter: blur(3px); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.aktiv { display: flex; }
  .modal-boks { background: var(--card-bg); border-radius: 18px; padding: 30px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 8px 36px rgba(210,100,160,0.2); border: 1px solid var(--border); }
  .modal-boks h3 { color: var(--accent); margin-bottom: 10px; }
  .modal-boks p  { color: var(--muted); font-size: 0.93rem; margin-bottom: 22px; line-height: 1.6; }
  .modal-knapper { display: flex; gap: 10px; }
  .modal-ja { flex: 1; padding: 11px; border: none; border-radius: 10px; background: var(--red-light); color: #c04070; font-size: 1rem; font-family: Georgia, serif; cursor: pointer; }
  .modal-nej { flex: 1; padding: 11px; border: none; border-radius: 10px; background: linear-gradient(135deg, #e8a0bf, #c8b4e8); color: #fff; font-size: 1rem; font-family: Georgia, serif; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>🧶 Louises Strikkehjørne</h1>
  <p>Din personlige strikke-tracker</p>
</header>
<div class="stats">
  <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">Projekter</div></div>
  <div class="stat-box"><div class="num" id="stat-gang">0</div><div class="lbl">I gang</div></div>
  <div class="stat-box"><div class="num" id="stat-faerd">0</div><div class="lbl">Færdige</div></div>
  <div class="stat-box"><div class="num" id="stat-raekker">0</div><div class="lbl">Rækker i alt</div></div>
</div>
<div class="bolge"></div>
<div class="container">
  <button class="ny-knap" onclick="aabneFormular()">🌸 Nyt Projekt</button>
  <div class="formular" id="formular">
    <h3 id="formular-titel">✨ Nyt Projekt</h3>
    <label>Projektnavn *</label>
    <input id="inp-navn" placeholder="fx sweater">
    <label>Garn</label>
    <input id="inp-garn" placeholder="fx Drops Alaska, naturhvid">
    <label>Pindestørrelse</label>
    <input id="inp-pind" placeholder="fx 5 mm">
    <label>Status</label>
    <select id="inp-status">
      <option value="ikke">🟡 Ikke startet</option>
      <option value="gang">🟠 I gang</option>
      <option value="faerd">🟢 Færdig</option>
    </select>
    <label>Noter</label>
    <textarea id="inp-noter" placeholder="Mønsterbeskrivelse, kommentarer..."></textarea>
    <div class="upload-sektion">
      <label>📎 Tilføj billeder og opskrifter (PDF)</label>
      <div class="upload-grid">
        <label class="upload-boks">
          <input type="file" accept="image/*" multiple onchange="tilfoejFiler(this, 'billede')">
          <span class="upload-ikon">📸</span>
          <div class="upload-tekst">Tryk for at tilføje billeder</div>
        </label>
        <label class="upload-boks">
          <input type="file" accept="application/pdf" multiple onchange="tilfoejFiler(this, 'pdf')">
          <span class="upload-ikon">📄</span>
          <div class="upload-tekst">Tryk for at tilføje PDF-opskrifter</div>
        </label>
      </div>
      <div class="upload-preview" id="upload-preview"></div>
    </div>
    <div class="form-knapper">
      <button class="gem-knap" onclick="gemProjekt()">💾 Gem</button>
      <button class="annuller-knap" onclick="lukFormular()">Annuller</button>
    </div>
  </div>
  <div id="liste"></div>
</div>
<div class="lightbox" id="lightbox">
  <button class="lightbox-luk" onclick="lukkLightbox()">✕</button>
  <div id="lightbox-indhold"></div>
</div>
<div class="modal-overlay" id="slet-modal">
  <div class="modal-boks">
    <h3>🗑️ Slet projekt?</h3>
    <p id="slet-tekst">Er du sikker?</p>
    <div class="modal-knapper">
      <button class="modal-ja" onclick="bekraeftSlet()">Ja, slet</button>
      <button class="modal-nej" onclick="lukkModal()">Bevar det 🌸</button>
    </div>
  </div>
</div>
<script>
  let projekter = JSON.parse(localStorage.getItem('strikke_v4')) || [];
  let redigerIndex = null;
  let sletIndex = null;
  let nyeFiler = [];
  const statusTekst  = { ikke: '🟡 Ikke startet', gang: '🟠 I gang', faerd: '🟢 Færdig' };
  const statusKlasse = { ikke: 'status-ikke', gang: 'status-gang', faerd: 'status-faerd' };
  function gem() { localStorage.setItem('strikke_v4', JSON.stringify(projekter)); }
  function tilfoejFiler(input, type) {
    Array.from(input.files).forEach(fil => {
      const reader = new FileReader();
      reader.onload = e => { nyeFiler.push({ type, navn: fil.name, data: e.target.result }); opdaterPreview(); };
      reader.readAsDataURL(fil);
    });
    input.value = '';
  }
  function fjernNyFil(index) { nyeFiler.splice(index, 1); opdaterPreview(); }
  function opdaterPreview() {
    document.getElementById('upload-preview').innerHTML = nyeFiler.map((f, i) => `
      <div class="preview-item">
        ${f.type === 'billede' ? `<img src="${f.data}" alt="${f.navn}">` : `<div class="preview-pdf"><span>📄</span>${f.navn.substring(0,15)}${f.navn.length>15?'...':''}</div>`}
        <button class="preview-slet" onclick="fjernNyFil(${i})">✕</button>
      </div>`).join('');
  }
  function aabneFormular(index = null) {
    redigerIndex = index; nyeFiler = []; opdaterPreview();
    if (index !== null) {
      const p = projekter[index];
      document.getElementById('formular-titel').textContent = '✏️ Rediger Projekt';
      document.getElementById('inp-navn').value   = p.navn   || '';
      document.getElementById('inp-garn').value   = p.garn   || '';
      document.getElementById('inp-pind').value   = p.pind   || '';
      document.getElementById('inp-status').value = p.status || 'ikke';
      document.getElementById('inp-noter').value  = p.noter  || '';
      if (p.filer && p.filer.length) { nyeFiler = [...p.filer]; opdaterPreview(); }
    } else {
      document.getElementById('formular-titel').textContent = '✨ Nyt Projekt';
      ['inp-navn','inp-garn','inp-pind','inp-noter'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('inp-status').value = 'ikke';
    }
    document.getElementById('formular').style.display = 'block';
    document.getElementById('inp-navn').focus();
  }
  function lukFormular() { document.getElementById('formular').style.display = 'none'; redigerIndex = null; nyeFiler = []; }
  function gemProjekt() {
    const navn = document.getElementById('inp-navn').value.trim();
    if (!navn) { alert('Skriv et projektnavn 🌸'); return; }
    const projekt = {
      navn, garn: document.getElementById('inp-garn').value.trim(),
      pind: document.getElementById('inp-pind').value.trim(),
      status: document.getElementById('inp-status').value,
      noter: document.getElementById('inp-noter').value.trim(),
      filer: [...nyeFiler],
      raekker: redigerIndex !== null ? (projekter[redigerIndex].raekker || 0) : 0
    };
    if (redigerIndex !== null) { projekter[redigerIndex] = projekt; } else { projekter.push(projekt); }
    gem(); lukFormular(); visProjekter();
  }
  function justerRaekke(index, delta) { projekter[index].raekker = Math.max(0, (projekter[index].raekker || 0) + delta); gem(); visProjekter(); }
  function aabneMedia(data, type, navn) {
    if (type === 'pdf') {
      const byteString = atob(data.split(',')[1]);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
      const blob = new Blob([ab], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      return;
    }
    document.getElementById('lightbox-indhold').innerHTML = `<img src="${data}" alt="Billede">`;
    document.getElementById('lightbox').classList.add('aktiv');
  }
  function lukkLightbox() { document.getElementById('lightbox').classList.remove('aktiv'); }
  function bekraeftSletning(index) {
    sletIndex = index;
    document.getElementById('slet-tekst').textContent = `Er du sikker på, at du vil slette "${projekter[index].navn}"?`;
    document.getElementById('slet-modal').classList.add('aktiv');
  }
  function bekraeftSlet() { if (sletIndex !== null) { projekter.splice(sletIndex, 1); gem(); visProjekter(); } lukkModal(); }
  function lukkModal() { document.getElementById('slet-modal').classList.remove('aktiv'); sletIndex = null; }
  function opdaterStatistik() {
    document.getElementById('stat-total').textContent   = projekter.length;
    document.getElementById('stat-gang').textContent    = projekter.filter(p => p.status === 'gang').length;
    document.getElementById('stat-faerd').textContent   = projekter.filter(p => p.status === 'faerd').length;
    document.getElementById('stat-raekker').textContent = projekter.reduce((s, p) => s + (p.raekker || 0), 0);
  }
  function visProjekter() {
    opdaterStatistik();
    const liste = document.getElementById('liste');
    if (projekter.length === 0) { liste.innerHTML = '<div class="tom-besked">🌸 Ingen projekter endnu — tryk på knappen for at tilføje dit første! 🧶</div>'; return; }
    liste.innerHTML = projekter.map((p, i) => {
      const filer    = p.filer || [];
      const billeder = filer.filter(f => f.type === 'billede');
      const pdfer    = filer.filter(f => f.type === 'pdf');
      return `
      <div class="projekt-kort">
        <div class="kort-top">
          <div class="kort-titel">${p.navn}</div>
          <span class="status-badge ${statusKlasse[p.status] || 'status-ikke'}">${statusTekst[p.status] || statusTekst.ikke}</span>
        </div>
        <div class="kort-info">
          ${p.garn ? `🧶 ${p.garn}` : ''} ${p.garn && p.pind ? '·' : ''} ${p.pind ? `📌 Pind ${p.pind}` : ''}
        </div>
        ${p.noter ? `<div class="noter-boks">📝 ${p.noter}</div>` : ''}
        ${filer.length > 0 ? `<div class="medie-galleri">
          ${billeder.map(f => `<div class="medie-item" onclick="aabneMedia('${f.data}','billede','${f.navn}')"><img src="${f.data}" alt="${f.navn}"></div>`).join('')}
          ${pdfer.map(f => `<div class="medie-item" onclick="aabneMedia('${f.data}','pdf','${f.navn}')"><div class="medie-pdf-thumb"><span>📄</span>${f.navn.substring(0,12)}${f.navn.length>12?'...':''}</div></div>`).join('')}
        </div>` : ''}
        <div class="raekke-sektion">
          <span class="raekke-label">Rækker:</span>
          <button class="raekke-knap raekke-minus" onclick="justerRaekke(${i},-1)">−</button>
          <span class="raekke-antal">${p.raekker || 0}</span>
          <button class="raekke-knap raekke-plus"  onclick="justerRaekke(${i},+1)">+</button>
          <button class="raekke-knap raekke-nul"   onclick="justerRaekke(${i},-(projekter[${i}].raekker||0))">Nulstil</button>
        </div>
        <div class="kort-handlinger">
          <button class="rediger-knap" onclick="aabneFormular(${i})">✏️ Rediger</button>
          <button class="slet-knap"    onclick="bekraeftSletning(${i})">🗑️ Slet</button>
        </div>
      </div>`;
    }).join('');
  }
  visProjekter();
</script>
</body>
</html>
