<!DOCTYPE html>

<html lang="da">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Louises Strikkehjørne</title>

<style>

body{

  font-family: Arial, sans-serif;

  background:#f7f3eb;

  margin:0;

  padding:20px;

}

h1{

  text-align:center;

  color:#6b4f3a;

}

button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:12px;

  background:#d9c7b3;

  font-size:18px;

}

.card{

  background:white;

  padding:15px;

  margin-top:15px;

  border-radius:12px;

  box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

input{

  width:100%;

  padding:10px;

  margin-top:8px;

  margin-bottom:8px;

  box-sizing:border-box;

}

#formular{

  display:none;

}

</style>

</head>

<body>

<h1>🧶 Louises Strikkehjørne</h1>

<button onclick="visFormular()">

➕ Nyt Projekt

</button>

<div id="formular" class="card">

<input id="projektNavn" placeholder="Projektnavn">

<input id="garnNavn" placeholder="Garn">

<button onclick="gemProjekt()">

💾 Gem Projekt

</button>

</div>

<h2>Mine Projekter</h2>

<div id="liste"></div>

<script>

function visFormular(){
  alert("Hej Louise 😍");

  document.getElementById("formular").style.display="block";

}

function gemProjekt(){

  let navn =

  document.getElementById("projektNavn").value;

  let garn =

  document.getElementById("garnNavn").value;

  if(navn===""){

    alert("Skriv et projektnavn");

    return;

  }

  let projekter =

  JSON.parse(localStorage.getItem("projekter")) || [];

  projekter.push({

    navn: navn,

    garn: garn

  });

  localStorage.setItem(

    "projekter",

    JSON.stringify(projekter)

  );

  visProjekter();

}

function visProjekter(){

  let projekter =

  JSON.parse(localStorage.getItem("projekter")) || [];

  let html="";

  projekter.forEach(function(projekt){

    html += `

      <div class="card">

        <h3>${projekt.navn}</h3>

        <p>Garn: ${projekt.garn}</p>

      </div>

    `;

  });

  document.getElementById("liste").innerHTML = html;

}

visProjekter();

</script>

</body>

</html>
