<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Louises Strikkehjørne</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f6f0e7;
  margin:0;
  padding:20px;
  color:#5a4a3a;
}

h1{
  text-align:center;
}

.card{
  background:white;
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#e8dcc7;
  font-size:18px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  box-sizing:border-box;
  border-radius:10px;
  border:1px solid #ddd;
}

#form{
  display:none;
}
</style>
</head>

<body>

<h1>🧶 Louises Strikkehjørne</h1>

<button onclick="visForm()">➕ Nyt Projekt</button>

<div id="form" class="card">
  <input id="navn" placeholder="Projektnavn">
  <input id="garn" placeholder="Garn">
  <button onclick="gemProjekt()">💾 Gem Projekt</button>
</div>

<h2>Mine Projekter</h2>

<div id="projekter"></div>

<script>
let projekter =
JSON.parse(localStorage.getItem("projekter") || "[]");

function visForm(){
  document.getElementById("form").style.display="block";
}

function gemProjekt(){

  const navn =
  document.getElementById("navn").value;

  const garn =
  document.getElementById("garn").value;

  if(!navn) return;

  projekter.push({
    navn,
    garn
  });

  localStorage.setItem(
    "projekter",
    JSON.stringify(projekter)
  );

  visProjekter();


function visProjekter(){

  let html="";

  projekter.forEach(p=>{

    html += `
      <div class="card">
        <h3>🧶 ${p.navn}</h3>
        <p>Garn: ${p.garn}</p>
      </div>
    `;

  });

  document.getElementById(
    "projekter"
  ).innerHTML = html;
}

visProjekter();
</script>

</body>
</html>
